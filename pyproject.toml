[tool.pytest.ini_options]
# `--verbose`: show each test name and result for better visibility
# `-rEfX`: show extra summary for (E)rror, (f)ailed, and (X)passed tests
# `--tb=native`: use standard Python traceback format for debugging
# `-p no:warnings`: disable warnings plugin to keep test output clean
# `--assert=plain`: disable assertion rewriting to avoid import-order conflicts (see upstream PR #117060)
# `--max-worker-restart=0`: fail immediately on worker crash instead of restarting
addopts = "--verbose -rEfX --tb=native -p no:warnings --assert=plain --max-worker-restart=0"
testpaths = ["test"]
xfail_strict = true
markers = [
    "test_set_ci: [test set] marks tests to run in CI pipelines (select with `-m test_set_ci`)",
    "test_set_experimental: [test set] marks tests for experimental features (deselect with `-m \"not test_set_experimental\"`)",
    "test_set_perf: [test set] marks performance tests (select with `-m test_set_perf`)",
    "no_dynamo_reset: skips autouse TorchDynamo reset fixture",
    "single_worker: marks tests that must run on a single worker (select with `-m single_worker`)",
]
